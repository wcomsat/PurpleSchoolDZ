<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width>, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="styles.css">
</head>

<body>
    <main>
        <form action="#">
            <h1>Свяжитесь со мной</h1>
            <div>
                <div>
                    <label for="email">Введите E-mail</label>
                    <input type="email" name="email" id="email" placeholder="123@gmail.com" required>
                </div>
                <div>
                    <label for="telegramm">Telegramm</label>
                    <input type="password" name="telegramm" id="telegramm" placeholder="123@gmail.com" required>
                </div>
                <div>
                    <label for="topick">Выберите тему</label>
                    <select type="topick" name="topick" id="topick" placeholder="Приобретение курсов">
                        <option value="javascript">Javascript</option>
                    </select>
                </div>
                <label for="coment">Коментарий</label>
                <textarea type="text" name="text" id="text"></textarea>
            </div>
            <button type="submit">Отправить</button>
        </form>
    </main>
</body>

</html>
